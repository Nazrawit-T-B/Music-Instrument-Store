<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="../assets/css/signup.css">
    <link rel="stylesheet" href="../assets/css/header.css">
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    >
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    >
    <link
      id="favicon"
      rel="icon"
      type="image/jpg"
      href="../media/productimages/favicon.jpg"
    >
    <title>Create Account</title>
  </head>
  
  <body>
    <div id="header"></div>
    
    <div class="form-container">
        <form id="signup"> 
            <fieldset>
                <legend>Create Account</legend>
                <div class="form-row">
                    <div class="form-group half">
                        <label for="firstname">First Name:</label>
                        <input type="text" id="firstname" name="firstname" required />
                    </div>
                    <div class="form-group half">
                        <label for="lastname">Last Name:</label>
                        <input type="text" id="lastname" name="lastname" required />
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required />
                </div>
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required />
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required />
                    <small class="password-hint">Must be at least 8 characters with letters and numbers</small>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirm Password:</label>
                    <input type="password" id="confirm-password" name="confirm-password" required />
                </div>
                <input type="submit" value="Create Account" class="signup-button" />
                <p class="signin-link">Already have an account? <a href="signin.html">Sign in here</a></p>
            </fieldset>
        </form>
    </div>
    <script src="../assets/javascript/signup.js"></script>
  </body>
</html>
