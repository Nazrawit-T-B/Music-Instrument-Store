<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Fine Tune</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/footer.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link id="favicon" rel="icon" type="image/jpg" href="../media/productimages/favicon.jpg">

</head>

<body>

    <div id="header"></div>

    <div class="container" id="hero-section">
        <div class="left">

            <div class="hero_text">Music Instrument Market</div>

            <p class="hero_desc">Expand your collection and find the perfect instrument with us.</p>
            <a href="catalog.html">
                <div class="btn">
                    Select in the catalog
                    <div class="circle-icon">➜</div>
                </div>
            </a>
            <div class="search-bar">
                <label for="search"></label>
                <input type="search" id="search" placeholder="Search Products">
            </div>
            <div id="search-results"></div>
        </div>

        <img class="vinyl" src="../media/productimages/vinyl-record.jpg" alt="instrument" />
    </div>
    <div id="footer"></div>
    <script>
        fetch("header.html")
            .then(res => res.text())
            .then(data => document.getElementById("header").innerHTML = data);

        fetch("footer.html")
            .then(res => res.text())
            .then(data => document.getElementById("footer").innerHTML = data);
    </script>
    <script src="../assets/javascript/productNames.js"></script>
    <script src="../assets/javascript/search.js"></script>

</body>

</html>
