<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shopping Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="cart.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>
    <nav>
        <strong>Website Name</strong>
        <div>
            <a href="#hero-section">Home</a>
            <a href="#about-section">About Us</a>
            <a href="catalog.html">Catalog</a>
            <a href="productdetails.html">Product Details</a>
            <a href="cart.html">Cart</a>
            <a href="b">Sign-In</a>
        </div>
    </nav>
</header>

<div class="container">
    <div class="main-grid">

        <div class="card">
            <h2>Your Cart</h2>

            <div class="cart-box">
                <table class="cart-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Quantity</th>
                            <th>Action</th>
                            <th>Total</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td class="product-cell">
                                <div class="product">
                                    <div class="product-img"></div>
                                    <div>
                                        <strong>Laptop</strong><br>
                                        <small>Professional Model</small>
                                    </div>
                                </div>
                            </td>

                            <td>
                                <input type="number" min="1" value="1">
                            </td>

                            <td>
                                <div class="actions">
                                    <button class="purchase">Purchase</button>
                                    <button class="rent">Rent</button>
                                </div>
                            </td>

                            <td class="row-total">$0.00</td>
                        </tr>

                    </tbody>
                </table>
            </div>
        </div>

        
        <div>

            <div class="card details">
                <h3>Purchase Order Details</h3>
                <p><span>Subtotal</span><span>$0.00</span></p>
                <p><span>Tax</span><span>$0.00</span></p>
                <p><span>Discount</span><span>-$0.00</span></p>
                <p class="total"><span>Total</span><span>$0.00</span></p>
            </div>

            <br>

            <div class="card details">
                <h3>Rent Order Details</h3>
                <p><span>Days</span><span>3</span></p>
                <p><span>Cost / Day</span><span>$0.00</span></p>
                <p class="total"><span>Total Rent</span><span>$0.00</span></p>

                <div class="checkout">
                    <button>Proceed to Checkout</button>
                </div>
            </div>

        </div>
    </div>
</div>


</body>
</html>
